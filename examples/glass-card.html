<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>design-effects-skill — Glass Morphism</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: #0d0d1a;
      overflow: hidden;
    }

    /* Glass needs a rich background — without this, blur collapses */
    .bg { position: fixed; inset: 0; z-index: 0; }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
    }
    .blob-1 { width: 420px; height: 420px; background: #5b21b6; top: -120px; left: -80px; }
    .blob-2 { width: 380px; height: 380px; background: #0ea5e9; bottom: -80px; right: -40px; }
    .blob-3 { width: 280px; height: 280px; background: #7c3aed; bottom: 80px; left: 140px; }

    @media (prefers-reduced-motion: no-preference) {
      .blob { animation: drift 14s ease-in-out infinite alternate; }
      .blob-2 { animation-delay: -5s; }
      .blob-3 { animation-delay: -9s; }
      @keyframes drift { to { transform: translate(28px, 18px) scale(1.04); } }
    }

    .glass-card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 20px;
      padding: 40px;
      max-width: 380px;
      width: 90%;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 14px;
    }

    h2 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    p {
      font-size: 14px;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 28px;
    }

    .glass-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.11);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .glass-btn:hover { background: rgba(255, 255, 255, 0.18); }

    .footer {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 0.08em;
      z-index: 2;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="glass-card">
    <div class="eyebrow">design-effects-skill</div>
    <h2>Glass morphism needs a rich background.</h2>
    <p><code style="font-size:12px;color:rgba(255,255,255,0.7)">backdrop-filter: blur(18px)</code><br><br>Without background blobs providing contrast and color, glass collapses into a grey rectangle. One hero effect per page.</p>
    <button class="glass-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2.5 2.5"/></svg>
      Get started
    </button>
  </div>

  <div class="footer">design-effects-skill · glass morphism · dark palette</div>
</body>
</html>
